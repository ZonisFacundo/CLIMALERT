spring.application.name=climalert
spring.config.import=optional:classpath:application-local.properties

weather.api.base-url=https://api.weatherapi.com/v1
weather.api.key=${WEATHER_API_KEY:}

clima.ubicacion=Buenos Aires, Argentina
clima.fetch-rate-ms=300000
clima.fetch-initial-delay-ms=0
clima.process-rate-ms=60000
clima.process-initial-delay-ms=5000


spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.starttls.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.quitwait=false


logging.level.root=INFO
logging.level.Schedulers=INFO
logging.level.Notificaciones=DEBUG
logging.level.ApIClima=INFO
logging.level.org.springframework.mail=DEBUG
logging.file.name=logs/climalert.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
